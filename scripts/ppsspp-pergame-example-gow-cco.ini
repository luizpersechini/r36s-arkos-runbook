; PPSSPP per-game config — example: God of War: Chains of Olympus (UCUS98653)
;
; Install at:  /roms/psp/ppsspp/PSP/SYSTEM/PerGame/UCUS98653_1.00.ini
; (create the PerGame directory if it doesn't exist)
;
; This is paired with the CWCheat 30 FPS lock at:
;   /roms/psp/ppsspp/PSP/Cheats/UCUS98653.ini
; Toggle the 30 FPS [Fixed] cheat by changing _C0 to _C1 on that line.
;
; The LockedCPUSpeed=666 MHz below is REQUIRED for the CWCheat vblank-insertion
; to function — at lower clocks the cheat can't keep up and reverts to default
; framerate behavior.

[Graphics]
RenderingMode = 0
FrameSkip = 2
AutoFrameSkip = True
ForceMaxEmulatedFPS = 30
BloomHack = 0
SplineBezierQuality = 0
DisableSlowFramebufEffects = False
VSyncInterval = False
MemBlockTransferGPU = True
PostShader = Off
TextureFiltering = 1
BufferFiltering = 1
AnisotropyLevel = 0
HardwareTransform = True
SoftwareSkinning = True
HighQualityDepth = 0
TexScalingLevel = 1
TexDeposterize = False
TextureBackoffCache = True
VertexDecCache = True
HardwareTessellation = False

[CPU]
CpuCore = 1
FastMemory = True
LockedCPUSpeed = 666

[Sound]
Enable = True
EnableSound = True
AudioLatency = 0
