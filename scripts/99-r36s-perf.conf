# /etc/sysctl.d/99-r36s-perf.conf
# Kernel memory tuning for the R36S running heavy emulators.
# Apply once: sudo sysctl -p /etc/sysctl.d/99-r36s-perf.conf
# Persistent across reboots via sysctl service auto-loading /etc/sysctl.d/*.conf

# Prefer zram swap aggressively over OOM-kill.
# Default 60. Higher = swap sooner, less likely to OOM under spikes.
vm.swappiness = 100

# Reclaim disk caches more readily when memory tight.
# Default 100. Higher = drop dentries/inodes faster.
vm.vfs_cache_pressure = 200

# Allow memory overcommit for emulators with sudden allocation spikes.
# 0 = heuristic check; 1 = always allow; 2 = strict. We choose 1.
vm.overcommit_memory = 1

# Reduce dirty page ratio — flush to disk eagerly, less RAM held by write buffers.
# Defaults: 10/20. R36S writes to SD card which is slow; less buffering helps
# avoid I/O stalls when emulators ask for memory.
vm.dirty_background_ratio = 5
vm.dirty_ratio = 10
